<script>
document.addEventListener("DOMContentLoaded", function() {
    const rateEvents = {"1974": ["暴力升息", "因應第一次石油危機惡性通膨，央行將利率大幅拉升至 14% 歷史高位。"], "1981": ["對抗二次危機", "第二次石油危機發酵，利率再度攀升至 13% 進行貨幣緊縮。"], "1989": ["打擊熱錢", "台股狂飆，央行調升利率至 7.75% 試圖降溫股市與地下金融。"], "1997": ["亞洲金融風暴", "為維持國內流動性並減緩外資撤出衝擊，央行開啟降息循環。"], "2001": ["網路泡沫降息", "經濟首次負成長，央行連續降息，重貼現率跌破 3%。"], "2008.5": ["海嘯大降息", "金融海嘯爆發前夕利率達 3.625% 波峰，隨後央行在年底前連續暴力降息至 1.25% 搶救經濟。"], "2020": ["疫情撒錢", "新冠疫情爆發，全球央行大放水，台灣重貼現率降至 1.125% 創歷史新低。"], "2022": ["跟隨Fed升息", "面對輸入性通膨與美國聯準會暴力升息，台灣央行重啟升息循環。"]};
    const detailsDiv = document.getElementById('rate-details');

    // 設定定時器等待 Plotly 圖表完全渲染掛載
    const checkChartRendered = setInterval(function() {
        const plotDiv = document.getElementById('interactive-chart');
        if (plotDiv && plotDiv.on) {
            clearInterval(checkChartRendered);

            // 監聽點擊事件
            plotDiv.on('plotly_click', function(data) {
                const clickedX = data.points[0].x; // 獲取點擊的年份
                const eventInfo = rateEvents[clickedX]; // 查詢該年份是否有事件

                if (eventInfo) {
                    // 若有點擊到特定歷史事件
                    detailsDiv.style.backgroundColor = "#e8f5e9"; // 淺綠色高光
                    detailsDiv.innerHTML = "<div class='event-title'>💡 " + clickedX + "年：" + eventInfo[0] + "</div><div>" + eventInfo[1] + "</div>";
                } else {
                    // 若僅點擊一般年份的折線
                    detailsDiv.style.backgroundColor = "#f8f9fa"; // 恢復預設灰底
                    detailsDiv.innerHTML = "<div class='event-title'>" + clickedX + "年</div><div>該年度重貼現率為 <b>" + data.points[0].y + "%</b>。<br>（點擊圖表上的黃色星星，查看歷次升降息循環的總經背景與政策考量）</div>";
                }
            });
        }
    }, 200);
});
