    <div id="analysis-box">
        💡 <b>歡迎使用歷史事件觀測儀：</b>請點擊圖表中的「黃色星星」，即可在此查閱大時代的總經歷史推演與深度分析。
    </div>

    <script>
        setTimeout(function() {
            var plotElement = document.getElementById('interactive-plot');

            plotElement.on('plotly_click', function(data){
                var box = document.getElementById('analysis-box');
                var foundContent = "";

                // 🚨 修正核心：使用 for 迴圈遍歷這條垂直線上「所有」被點擊到的圖層
                for (var i = 0; i < data.points.length; i++) {
                    var pt = data.points[i];

                    // 精準鎖定：只抓取我們命名的「重大歷史事件」圖層
                    if (pt.data.name && pt.data.name.includes('重大歷史事件')) {
                        if (pt.customdata !== undefined && pt.customdata !== '') {
                            foundContent = pt.customdata;
                            break; // 找到了就跳出迴圈
                        }
                    }
                }

                // 判斷是否成功抓取並渲染文字
                if(foundContent !== '') {
                    box.innerHTML = foundContent;
                    box.style.opacity = 0;
                    setTimeout(function(){ box.style.opacity = 1; }, 100);
                } else {
                    box.innerHTML = "💡 該資料點無重大政經事件分析，請點選圖表中的「黃色星星」。";
                }
            });
        }, 1000);
    </script>
