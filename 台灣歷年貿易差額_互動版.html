    <div id="trade-details">
        <span class="default-text">💡 點擊圖表上的黃色星星或柱狀圖，查看該年代貿易起伏背後的政經脈絡與產業轉型分析。</span>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var chart = document.getElementById('trade-chart');
            var detailsDiv = document.getElementById('trade-details');

            chart.on('plotly_click', function(data) {
                // 嘗試抓取被點擊元素的 customdata (我們在 Python 中綁定的 HTML 字串)
                var point = data.points[0];
                var customDataInfo = point.customdata;

                if (customDataInfo && customDataInfo !== "") {
                    detailsDiv.innerHTML = customDataInfo;
                    // 點擊後給予一個小小的動畫反饋
                    detailsDiv.style.opacity = 0;
                    setTimeout(function(){ detailsDiv.style.opacity = 1; }, 100);
                } else {
                    detailsDiv.innerHTML = "<span class='default-text'>📈 此年份無重大政經事件紀錄。請嘗試點擊帶有黃色星星的年份！</span>";
                }
            });
        });
    </script>
