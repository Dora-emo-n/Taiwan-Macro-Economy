    <script>
        // 確保網頁讀取完成後再掛載監聽器
        document.addEventListener('DOMContentLoaded', function() {
            var myPlot = document.getElementById('gdp-plotly-chart');
            var detailBox = document.getElementById('event-details');

            myPlot.on('plotly_click', function(data) {
                // 抓取點擊點的年份與 customdata (詳細說明)
                var point = data.points[0];
                var year = point.x;
                var details = point.customdata;

                // 更新下方 div 的內容
                detailBox.innerHTML = "<div style='font-size: 1.3rem; margin-bottom: 8px;'><b>" + year + " 年</b></div>" + details;

                // 點擊時加上微微的動畫效果
                detailBox.style.transform = "scale(0.98)";
                setTimeout(() => { detailBox.style.transform = "scale(1)"; }, 150);
            });
        });
    </script>
