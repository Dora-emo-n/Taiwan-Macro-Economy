    <script>
        const eventData = {"1979": {"title": "第二次石油危機", "desc": "經歷兩次石油危機，台幣匯率於此時期由40元逐步微幅調整至36元。"}, "1985": {"title": "廣場協議", "desc": "國際逼迫亞幣升值，台幣面臨巨大壓力，隨後數年內從近 40 元一路狂升至 25 元。"}, "1997": {"title": "亞洲金融風暴", "desc": "亞洲多國貨幣崩盤，央行初期阻貶，後放手讓台幣貶破 32 大關以保出口競爭力。"}, "2008": {"title": "金融海嘯", "desc": "全球資金動盪，外資大舉匯出，但台灣外匯存底底氣足，短暫震盪後重回擴張軌道。"}, "2021": {"title": "疫情熱錢湧入", "desc": "聯準會無限QE，台灣出口強勁帶動熱錢湧入，台幣強勢升值創下近年新高(27.69)。"}};

        document.addEventListener('DOMContentLoaded', function() {
            const chartDiv = document.getElementById('plotly-chart');
            const detailsDiv = document.getElementById('forex-details');

            chartDiv.on('plotly_click', function(data) {
                // 【🎯 關鍵修正】：使用 .find() 遍歷所有被點擊到的圖層，精準定位「重大歷史事件」
                const targetPoint = data.points.find(p => p.data.name === '重大歷史事件');

                if(targetPoint) {
                    const year = String(targetPoint.x); 
                    const info = eventData[year];

                    if(info) {
                        detailsDiv.style.backgroundColor = '#fff3e0'; 
                        detailsDiv.innerHTML = `
                            <div class="event-title">⏳ ${year}年：${info.title}</div>
                            <div class="event-desc">${info.desc}</div>
                        `;

                        setTimeout(() => {
                            detailsDiv.style.backgroundColor = '#f8f9fa';
                        }, 300);
                    }
                }
            });
        });
    </script>
