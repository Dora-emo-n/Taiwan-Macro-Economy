    <script>
        // 從 Python 注入的事件字典
        const eventData = {"1973": {"title": "危機前夕", "detail": "中東戰爭導致油價飆漲，全球物價開始蠢動。"}, "1974": {"title": "第一次石油危機", "detail": "台灣通膨率創下 47.5% 的歷史天價，政府採取強烈干預手段。"}, "1979": {"title": "中美斷交", "detail": "中美斷交引發國內恐慌，加上伊朗革命導致油價翻倍，物價再次失控。"}, "1980": {"title": "第二次石油危機", "detail": "通膨率飆升至 19.0%，央行實施緊縮貨幣政策以穩定物價。"}, "1989": {"title": "台股泡沫", "detail": "台股狂飆逼近萬點，地下投資盛行，熱錢引發短暫的物價上漲。"}, "1997": {"title": "亞洲金融風暴", "detail": "亞洲多國貨幣貶值，台灣雖受創較輕，但內需降溫使通膨下滑。"}, "2001": {"title": "網路泡沫", "detail": "台灣面臨史上首次經濟負成長，需求不振，出現通縮疑慮。"}, "2008": {"title": "金融海嘯", "detail": "金融海嘯前夕，國際油價與農工原料狂漲，推升通膨至 3.5%。"}, "2009": {"title": "經濟衰退", "detail": "全球經濟大衰退，台灣出口重挫，創下罕見通縮。"}, "2022": {"title": "俄烏戰爭", "detail": "疫情後遺症疊加地緣政治衝突，引發嚴重的輸入性通膨。"}};

        // 等待 Plotly 載入完成
        setTimeout(function() {
            const plotDivs = document.getElementsByClassName('plotly-graph-div');
            if(plotDivs.length > 0) {
                const plot = plotDivs[0];
                const detailBox = document.getElementById('inflation-details');

                // 監聽點擊事件
                plot.on('plotly_click', function(data) {
                    const x = data.points[0].x; // 取得點擊的年份

                    if(eventData[x]) {
                        detailBox.style.borderLeftColor = "#e74c3c";
                        detailBox.innerHTML = "<h3>" + x + " 年：" + eventData[x].title + "</h3><p>" + eventData[x].detail + "</p>";
                    } else {
                        detailBox.style.borderLeftColor = "#95a5a6";
                        detailBox.innerHTML = "<b>" + x + " 年：</b> 該年度無重大政經異常記錄。點擊有『黃色星星』的年份以查看深度歷史事件。";
                    }
                });
            }
        }, 500); // 延遲 500ms 確保圖表 DOM 渲染完畢
    </script>
