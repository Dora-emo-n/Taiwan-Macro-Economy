    <script>
        const eventsData = {"1974": ["第一次石油危機", "經濟微幅震盪，但當時屬勞力密集產業，失業率仍低。"], "2001": ["網路泡沫破裂", "經濟首次負成長，失業率首度突破 4% 警戒線。"], "2002": ["加入 WTO 陣痛期", "傳統產業外移加速，引發結構性失業，創下歷史高點。"], "2009": ["金融海嘯無薪假", "出口重挫，企業實施無薪假，失業率飆升至 5.85% 史上最高。"], "2020": ["新冠疫情衝擊", "內需服務業受創，但製造業受惠轉單效應，失業率小幅攀升後回穩。"], "2023": ["疫後大缺工", "少子化疊加服務業復甦，台灣面臨嚴重的結構性缺工，失業率創近年新低。"]};
        const chartDiv = document.getElementById('plotly-chart');
        const detailsDiv = document.getElementById('unemp-details');

        chartDiv.on('plotly_click', function(data){
            if(data.points.length > 0) {
                const point = data.points[0];
                const year = point.x;

                if(eventsData[year]) {
                    const title = eventsData[year][0];
                    const desc = eventsData[year][1];
                    detailsDiv.innerHTML = `
                        <div class="event-title">📌 ${year}年：${title}</div>
                        <div class="event-desc">${desc}</div>
                    `;
                } else {
                    detailsDiv.innerHTML = `
                        <div class="event-desc">📊 <b>${year}年</b> 失業率為 <b>${point.y.toFixed(2)}%</b>。<br><span style="color:gray; font-size:0.9em;">(此年份無特殊重大歷史事件紀錄)</span></div>
                    `;
                }
            }
        });
    </script>
