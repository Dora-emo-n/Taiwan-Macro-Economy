    <script>
        // 等待網頁元素與 Plotly 載入完成
        window.addEventListener('DOMContentLoaded', function() {
            var eventData = {"1974": {"title": "第一次石油危機", "desc": "全球能源危機引發惡性通膨，台灣央行採取大幅緊縮貨幣政策，M1B 年增率顯著下滑，資金全面收縮。"}, "1986": {"title": "台灣錢淹腳目時代", "desc": "台灣出口貿易順差創下歷史紀錄，出超引來排山倒海的熱錢，形成台灣歷史上罕見的資金氾濫大潮。"}, "1989": {"title": "股市狂飆破萬點", "desc": "台股首次狂飆破萬點，全民陷入股瘋，內需經濟極度狂熱，M1B 年增率飆破 30%，資金動能達到歷史頂峰。"}, "1990": {"title": "資產泡沫破裂", "desc": "台股在短時間內崩盤萬點，熱錢快速撤出，市場流動性瞬間枯竭，M1B 罕見出現大幅負成長（-6.5%）。"}, "1997": {"title": "亞洲金融風暴", "desc": "東南亞與南韓經濟相繼淪陷，外資大幅撤離亞洲。台灣央行放手台幣貶值以保障出口競爭力，整體資金動能急遽衰退。"}, "2001": {"title": "網路泡沫與經濟通縮", "desc": "美國科技股泡沫破裂，全球科技業重挫。台灣面臨史上首次經濟負成長，央行展開連續降息以釋放流動性。"}, "2008": {"title": "全球金融海嘯", "desc": "雷曼兄弟倒閉引發全球信用流動性危機，台灣出口重創、企業實施無薪假，M1B 跌入負成長區間。"}, "2009": {"title": "QE 寬鬆時代與黃金交叉", "desc": "全球央行開啟量化寬鬆（QE），台商資金大舉回流。M1B 向上強勢突破 M2，形成經典的台股動能黃金交叉。"}, "2020": {"title": "疫情全球無限 QE", "desc": "新冠疫情爆發，聯準會祭出無限量 QE，台灣央行降息一碼。寬鬆環境加上科技轉單效應，資金大氾濫、台股迎來史詩級牛市。"}, "2022": {"title": "全球暴力升息與死亡交叉", "desc": "為對抗惡性通膨，美聯準會與台灣央行同步重手升息收水。資金撤回定存，M1B 跌破 M2 形成「死亡交叉」，資金動能減緩。"}};

            // 利用 Interval 定時偵測 Plotly 產生的圖表主體物件
            var checkPlotlyExist = setInterval(function() {
                var graphDiv = document.getElementsByClassName('plotly-graph-div')[0];

                if (graphDiv && graphDiv.on) {
                    clearInterval(checkPlotlyExist); 

                    // 監聽 Plotly 的點擊點事件
                    graphDiv.on('plotly_click', function(data){

                        // 🌟 【修正重點】使用 find() 搜尋該垂直線上所有的點，找出名為「重大資金事件」的星星
                        var starPoint = data.points.find(function(p) {
                            return p.data.name === '重大資金事件';
                        });

                        // 如果有找到星星，才執行渲染動作
                        if (starPoint) {
                            var clickedYear = starPoint.x;

                            if (eventData[clickedYear]) {
                                var matchedEvent = eventData[clickedYear];
                                var detailsBox = document.getElementById('money-details');

                                // 動態更新下方區塊的內容
                                detailsBox.style.backgroundColor = '#fffdf3';
                                detailsBox.style.borderLeftColor = '#e67e22';
                                detailsBox.innerHTML = 
                                    '<div class="event-title">📌 ' + clickedYear + ' 年事件：' + matchedEvent.title + '</div>' +
                                    '<div>' + matchedEvent.desc + '</div>';
                            }
                        }
                    });
                }
            }, 150);
        });
